# TEMPORARY diagnostic workflow — Windows test-crash isolation.
#
# The Windows CI leg's test run dies with exit 1 and no diagnostics while
# ~131 parallel tests are in flight (run 28559533069). This probe runs the
# suite serially so the last-started test identifies the crash site.
# Delete this file once the crash is fixed.
name: Windows probe (serial tests)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    name: Windows serial test probe
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.3.3"

      - name: Serial test run
        run: |
          swift --version
          swift test -c debug --no-parallel --filter "crashprobe"
          echo "exit: $LASTEXITCODE"
